:root{--azul:#123a63;--verde:#65a844;--laranja:#ef7d2c;--cinza:#777;--bg:#f4f7fb}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:#17202a}header{background:linear-gradient(135deg,var(--azul),#0f2742);color:white;padding:18px 16px;position:sticky;top:0;z-index:3}h1{font-size:20px;margin:0}.tabs{display:flex;gap:8px;padding:10px;background:white;position:sticky;top:61px;z-index:2;overflow:auto;box-shadow:0 2px 8px #0001}button{border:0;border-radius:10px;padding:10px 12px;font-weight:700;background:#e6eef7;color:#123a63}button.active{background:#123a63;color:white}main{padding:14px;max-width:1100px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.card{background:white;border-radius:16px;padding:14px;box-shadow:0 4px 14px #0001}.kpi{color:white;text-align:center;min-height:88px;display:flex;flex-direction:column;justify-content:center}.kpi b{font-size:28px;margin-top:8px}.blue{background:#5b9bd5}.green{background:#70ad47}.orange{background:#ed7d31}.gray{background:#888}.red{background:#e53935}.yellow{background:#ffc000;color:#222}.section{display:none}.section.on{display:block}input,select{width:100%;padding:11px;border:1px solid #ccd6e0;border-radius:10px;background:white}label{font-size:13px;font-weight:700;margin:8px 0 4px;display:block}.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}th,td{padding:9px;border-bottom:1px solid #eef2f6;text-align:left;font-size:13px}th{background:#d9eaf8}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-weight:700;font-size:12px}.ok{background:#dff2d8;color:#2e7d32}.bad{background:#fde0dc;color:#b71c1c}canvas{width:100%;max-height:260px}.small{font-size:12px;color:#607080}@media(max-width:700px){th:nth-child(4),td:nth-child(4 </style></head><body><header><h1>Controle de Manutenção</h1><div class="small" style="color:#d8eafd">App mobile baseado na planilha</div></header><nav class="tabs"><button class="active" onclick="show('dash',this)">Dashboard</button><button onclick="show('lista',this)">Lançamentos</button><button onclick="show('novo',this)">Novo serviço</button><button onclick="show('cadastros',this)">Cadastros</button></nav><main>

<section id="lista" class="section"><div class="toolbar"><input id="busca" placeholder="Buscar por placa, fornecedor, status..." oninput="renderList()"><button onclick="exportCSV()">Exportar CSV</button><button onclick="resetData()">Restaurar base inicial</button></div><div class="card" style="overflow:auto"><table id="tbl"></table></div></section>

function norm(v){return (v??'').toString().trim()}
function daysBetween(a,b){if(!a)return 0;let d1=new Date(a),d2=b?new Date(b):new Date();return Math.max(0,Math.round((d2-d1)/(1000*60*60*24)))}
function enrich(r){let dias=Number(r['Dias Parado']); if(!dias) dias=daysBetween(r['Data Entrada'],r['Data Finalização']); let sla=dias<=5?'Dentro SLA':'Fora SLA'; return {...r,'Dias Parado':dias,'SLA 5 Dias':r['SLA 5 Dias']||sla}}
function all(){return DB.lancamentos.map(enrich).filter(r=>norm(r.Placa)||norm(r.Serviço)||norm(r.Status))}
function countBy(key, rows=all()){let m={}; rows.forEach(r=>{let k=norm(r[key])||'(vazio)'; m[k]=(m[k]||0)+1}); return m}
function show(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active'); if(id==='lista')renderList(); if(id==='cadastros')renderCad(); renderDash()}
function renderDash(){let rows=all(),total=rows.length,fin=rows.filter(r=>norm(r.Status)==='Finalizado').length,ab=total-fin,dias=rows.reduce((s,r)=>s+(Number(r['Dias Parado'])||0),0)/(total||1),ok=rows.filter(r=>norm(r['SLA 5 Dias'])==='Dentro SLA').length,pct=ok/(total||1); let cls=pct>=.9?'green':pct>=.8?'yellow':'red'; document.getElementById('kpis').innerHTML=`<div class="card kpi blue">Total OS<b>${total}</b></div><div class="card kpi green">Finalizadas<b>${fin}</b></div><div class="card kpi orange">Em aberto<b>${ab}</b></div><div class="card kpi gray">Média dias<b>${dias.toFixed(1).replace('.',',')}</b></div><div class="card kpi ${cls}">SLA dentro<b>${Math.round(pct*100)}%</b></div>`; drawBar('chartTipo',countBy('Tipo OS'),['#5b9bd5','#70ad47','#ed7d31']); drawBar('chartStatus',countBy('Status'),['#70ad47','#ed7d31','#5b9bd5','#ffc000','#e53935']); drawBar('chartForn',top(countBy('Fornecedor'),8),['#123a63','#1f5b89','#5b9bd5']);}
function top(obj,n){return Object.fromEntries(Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n))}
function drawBar(id,obj,colors){let c=document.getElementById(id),ctx=c.getContext('2d'),w=c.width=c.clientWidth*2,h=c.height=260*2;ctx.clearRect(0,0,w,h);let entries=Object.entries(obj),max=Math.max(1,...entries.map(e=>e[1])),barH=h/(entries.length||1)-14;ctx.font='24px Arial';entries.forEach((e,i)=>{let y=i*(barH+14)+20,bw=(w-260)*(e[1]/max);ctx.fillStyle=colors[i%colors.length];ctx.fillRect(210,y,bw,barH);ctx.fillStyle='#17202a';ctx.fillText(e[0].slice(0,18),10,y+barH*.65);ctx.fillText(e[1],220+bw,y+barH*.65)})}
function renderList(){let q=norm(document.getElementById('busca').value).toLowerCase();let rows=all().filter(r=>JSON.stringify(r).toLowerCase().includes(q)).slice(0,500);let cols=['Data Entrada','Placa','Modelo','Serviço','Tipo OS','Fornecedor','Status','Dias Parado','SLA 5 Dias'];document.getElementById('tbl').innerHTML='<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>'+rows.map(r=>'<tr>'+cols.map(c=>`<td>${c==='SLA 5 Dias'?'<span class="pill '+(r[c]==='Dentro SLA'?'ok':'bad')+'">'+norm(r[c])+'</span>':norm(r[c])}</td>`).join('')+'</tr>').join('')}
function renderCad(){document.getElementById('veiculos').innerHTML=DB.veiculos.slice(0,120).map(v=>`<div>${v.Placa||''} - ${v.Modelo||''}</div>`).join('');document.getElementById('servicosBox').innerHTML=DB.servicos.map(s=>`<div>${s.Serviço||''} <span class="small">(${s['Tipo OS']||''})</span></div>`).join('')}
function lists(){let placas=[...new Set(DB.veiculos.map(v=>v.Placa).filter(Boolean))];document.getElementById('placas').innerHTML=placas.map(x=>`<option value="${x}">`).join('');document.getElementById('servicos').innerHTML=[...new Set(DB.servicos.map(s=>s.Serviço).filter(Boolean))].map(x=>`<option value="${x}">`).join('');document.getElementById('fornecedores').innerHTML=[...new Set(all().map(s=>s.Fornecedor).filter(Boolean))].map(x=>`<option value="${x}">`).join('')}
function saveForm(){let r={'Data Entrada':fDataEntrada.value,'Placa':fPlaca.value,'Modelo':fModelo.value,'Km Atual':fKm.value,'Serviço':fServico.value,'Tipo OS':fTipo.value,'Fornecedor':fFornecedor.value,'Valor':fValor.value,'Nº OS':fOS.value,'Status':fStatus.value,'Data Finalização':fDataFim.value};let e=enrich(r);r['Dias Parado']=e['Dias Parado'];r['SLA 5 Dias']=e['SLA 5 Dias'];DB.lancamentos.push(r);localStorage.setItem('manutencaoDB',JSON.stringify(DB));alert('Lançamento salvo!');document.querySelectorAll('#novo input').forEach(i=>i.value='');lists();renderDash()}
function exportCSV(){let rows=all();let cols=Object.keys(rows[0]||{});let csv=[cols.join(';'),...rows.map(r=>cols.map(c=>'"'+norm(r[c]).replaceAll('"','""')+'"').join(';'))].join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='lancamentos_manutencao.csv';a.click()}
function resetData(){if(confirm('Restaurar dados iniciais da planilha?')){localStorage.removeItem('manutencaoDB');DB=JSON.parse(JSON.stringify(INITIAL));lists();renderDash();renderList()}}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');lists();renderDash();
</script></body></html>
